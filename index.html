<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌤 Weather Dashboard</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter City Name">
        <button id="searchBtn">Search</button>
    </div>

    <div id="message"></div>

    <div id="weatherCard" class="weather-card">
        <h2 id="cityName"></h2>

        <div class="weather-info">
            <p><strong>Temperature:</strong> <span id="temperature"></span></p>
            <p><strong>Wind Speed:</strong> <span id="windspeed"></span></p>
            <p><strong>Wind Direction:</strong> <span id="winddirection"></span></p>
            <p><strong>Weather Code:</strong> <span id="weathercode"></span></p>
            <p><strong>Time:</strong> <span id="time"></span></p>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
